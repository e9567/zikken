        <h2>オープンデータとは</h2>
        <p>オープンデータとは、国や地方自治体などが保有する公共データを、誰でも無償で、
        自由に編集・再配布でき、営利目的も含めた二次利用が可能なルールで公開すること、またはその公開されたデータを指し </p>
        <h2>データレイクとは</h2>
        <p> 企業が生成する構造化データから画像や動画などの非構造化データまで、あらゆる種類の生データ（ネイティブ形式）を未加工のまま一元的に格納できる大規模なストレージリポジトリのことである。</p>
